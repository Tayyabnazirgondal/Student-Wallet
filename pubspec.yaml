name: student_wallet
description: Offline expense tracker for students by Daynix Studio.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  path: ^1.9.0
  in_app_review: ^2.0.9
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0f766e"
  adaptive_icon_foreground: "assets/icon.png"